<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= HEADER ================= -->

<header>
    <div class="logo">
        <i class="fa-solid fa-users"></i>
        <h2>EMS Dashboard</h2>
    </div>

    <button id="themeBtn">
        <i class="fa-solid fa-moon"></i>
    </button>
</header>

<!-- ================= DASHBOARD ================= -->

<section class="dashboard">

    <div class="card">
        <i class="fa-solid fa-users"></i>
        <h3>Total Employees</h3>
        <h2 id="totalEmployees">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-building"></i>
        <h3>Departments</h3>
        <h2 id="totalDepartments">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-indian-rupee-sign"></i>
        <h3>Total Salary</h3>
        <h2 id="totalSalary">₹0</h2>
    </div>

</section>

<!-- ================= FORM ================= -->

<section class="container">

<div class="form-box">

<h2>Add Employee</h2>

<form id="employeeForm">

<input
type="text"
id="name"
placeholder="Employee Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="number"
id="salary"
placeholder="Salary"
required>

<select id="department">

    <option value="">Select Department</option>

    <option>HR</option>
    <option>IT</option>
    <option>Finance</option>
    <option>Sales</option>
    <option>Marketing</option>
    <option>VMC</option>
    <option>CNC</option>
    <option>Quality</option>
    <option>Production</option>
    <option>Design</option>
    <option>Die Manufacturing</option>

</select>

<input
type="text"
id="designation"
placeholder="Designation">

<input
type="file"
id="photo"
accept="image/*">

<button type="submit">
<i class="fa-solid fa-plus"></i>
Add Employee
</button>

</form>

</div>

<!-- ================= TABLE ================= -->

<div class="table-box">

<div class="table-top">

<input
type="text"
id="search"
placeholder="Search Employee...">

<select id="filterDept">

    <option value="">All Departments</option>

    <option>HR</option>
    <option>IT</option>
    <option>Finance</option>
    <option>Sales</option>
    <option>Marketing</option>
    <option>VMC</option>
    <option>CNC</option>
    <option>Quality</option>
    <option>Production</option>
    <option>Design</option>
    <option>Die Manufacturing</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Photo</th>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Designation</th>

<th>Salary</th>

<th>Action</th>

</tr>

</thead>

<tbody id="employeeTable">

</tbody>

</table>

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

<p>
© 2026 Employee Management System | Developed by Komal Yadav
</p>

</footer>

<script src="script.js"></script>

</body>
</html>
